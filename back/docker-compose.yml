services:
  db:
    image: postgres:15-alpine
    container_name: agroprecision-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agroprecision}
      POSTGRES_USER: ${POSTGRES_USER:-agro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agro_pass}
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./esquema_DB.sql:/docker-entrypoint-initdb.d/01-esquema_DB.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agro_user} -d ${POSTGRES_DB:-agroprecision}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: agroprecision-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  adminer:
    image: adminer
    container_name: agroprecision-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
